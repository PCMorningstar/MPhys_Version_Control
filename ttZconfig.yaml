general:
  debug_level: INFO
  input_filelist_path: "../metadata/filelist.txt"
  input_sumweights_path: "../metadata/sum_of_weights.txt"
  output_path_histograms: "../output_histograms/"
  output_path_ntuples: "../output_ntuples/"
  default_sumweights: "NOSYS"
  default_event_weights: "weight_mc_NOSYS * weight_pileup_NOSYS * weight_leptonSF_tight_NOSYS * weight_jvt_effSF_NOSYS"
  default_reco_tree_name: "reco"
  xsection_files:
    - files: ["/cvmfs/atlas.cern.ch/repo/sw/database/GroupData/dev/PMGTools/PMGxsecDB_mc23.txt"]
      campaigns: ["mc23a", "mc23e", "mc23d"]
  luminosity:
    mc23a: 29300.0
  #  mc23e: 109400.0
  #  mc23d: 26700.0
  automatic_systematics: False
  nominal_only: True
  config_define_after_custom_class : True
  create_tlorentz_vectors_for: ["jet", "el", "mu"]
  use_rvec: True
  number_of_cpus: 12
  use_region_subfolders: True
  custom_frame_name: "MyCustomFrame"


regions:
  - name: "sec_region"
    selection: "selection_cuts_NOSYS == 1"

  - name: "2jets_region"
    selection: "selection_cuts_NOSYS == 1 && jet_size_NOSYS == 2"

  - name: "3jets_region"
    selection: "selection_cuts_NOSYS == 1 && jet_size_NOSYS == 3"

  - name: "4jets_region"
    selection: "selection_cuts_NOSYS == 1 && jet_size_NOSYS == 4"

  - name: "5jets_region"
    selection: "selection_cuts_NOSYS == 1 && jet_size_NOSYS == 5"

  - name: "6jets_region"
    selection: "selection_cuts_NOSYS == 1 && jet_size_NOSYS == 6"

  - name: "7jets_region"
    selection: "selection_cuts_NOSYS == 1 && jet_size_NOSYS == 7"

  - name: "8jets_region"
    selection: "selection_cuts_NOSYS == 1 && jet_size_NOSYS == 8"

  - name: "9jets_region"
    selection: "selection_cuts_NOSYS == 1 && jet_size_NOSYS == 9"

  - name: "10jets_region"
    selection: "selection_cuts_NOSYS == 1 && jet_size_NOSYS == 10"

ntuples:
  regions:
    - sec_region
    - 2jets_region
    - 3jets_region
    - 4jets_region
    - 5jets_region
    - 6jets_region
    - 7jets_region
    - 8jets_region
    - 9jets_region
    - 10jets_region 
  # If you want a selection here, use the same as the region:
  #selection: "selection_cuts_NOSYS" #&& jet_size_NOSYS == 2
  branches:
    - jet_size_NOSYS
    - selection_cuts_NOSYS
    - ordered_jet_truth_flavour_NOSYS 
    - raw_chi2_minval_truthall_NOSYS # For chi2 correct vs. mis-correct analysis
    # additional truth distributions - for mean and std extraction
    #- new_truth_mlpb_NOSYS
    #- new_truth_mlmbb_NOSYS
    #- new_truth_pTdiff_NOSYS
    #- new_truth_sum_deltaR_NOSYS
    #- new_truth_mllbb_NOSYS
    #- new_truth_mT_ttbar_NOSYS



    # NEW chi2 indexed
    - new_chi_indexed_jets_NOSYS

    # NEW MISMS indexed
    - new_misms_indexed_jets_NOSYS

    # NEW MDRS indexed
    - new_mdrs_indexed_jets_NOSYS

    - weight_mc_NOSYS              # MC generator weight
    - weight_pileup_NOSYS          # pileup weight
    - weight_leptonSF_tight_NOSYS  # lepton SF
    - weight_jvt_effSF_NOSYS       # jet SF 

    - event_jet_truth_idx
    - event_jet_truth_candidates

samples:
  - name: "data"
    dsids: [0]
    campaigns: ["2022"]
    simulation_type: "data"

  - name: "ttll"
    dsids: [601230]
    campaigns: ["mc23a"]
    simulation_type: "fullsim"
